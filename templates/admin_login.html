{% extends "base.html" %}
{% block title %}Admin Login — Ratha Yatra 2026{% endblock %}

{% block content %}

<div class="card" style="max-width:400px;margin:30px auto">
  <div style="text-align:center;margin-bottom:18px">
    <div style="font-size:40px">🔒</div>
    <div style="font-size:20px;font-weight:700;margin-top:6px">Admin Dashboard</div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
      Authorized coordinators only.
    </div>
  </div>

  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-input" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" required>
    </div>
    <button type="submit" class="btn btn-block">🔓 Log in</button>
  </form>

  <div class="alert alert-info" style="margin-top:14px;font-size:11px">
    <strong>Demo credentials:</strong><br>
    Username: <code>admin</code> · Password: <code>rathayatra2026</code>
  </div>
</div>

{% endblock %}
